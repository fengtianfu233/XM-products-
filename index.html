<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>佛山市鑫敏电子科技有限公司 / Foshan Xinmin Electronics</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Microsoft YaHei', Arial, sans-serif;
            background: #f5f5f5;
            display: flex; align-items: center; justify-content: center;
            min-height: 100vh; text-align: center;
        }
        .container { background: #fff; padding: 48px 32px; border-radius: 16px; box-shadow: 0 4px 24px rgba(0,0,0,0.08); max-width: 400px; width: 90%; }
        h1 { font-size: 20px; color: #2d3748; margin-bottom: 8px; }
        p { color: #666; margin-bottom: 24px; font-size: 14px; }
        .links { display: flex; gap: 16px; justify-content: center; }
        .lang-link {
            display: inline-flex; align-items: center; gap: 6px;
            padding: 14px 28px; border-radius: 10px; text-decoration: none;
            font-size: 16px; font-weight: 600; transition: all 0.2s ease;
        }
        .lang-link.zh { background: #4299e1; color: #fff; }
        .lang-link.zh:hover { background: #3182ce; }
        .lang-link.en { background: #e2e8f0; color: #2d3748; }
        .lang-link.en:hover { background: #cbd5e1; }
    </style>
    <script>
        (function() {
            const lang = (navigator.language || navigator.userLanguage || '').toLowerCase();
            if (lang.startsWith('zh')) {
                window.location.replace('zh/');
            } else {
                window.location.replace('en/');
            }
        })();
    </script>
</head>
<body>
    <div class="container">
        <h1>佛山市鑫敏电子科技有限公司<br>Foshan Xinmin Electronics</h1>
        <p>Select your language / 请选择语言</p>
        <div class="links">
            <a href="zh/" class="lang-link zh">中文</a>
            <a href="en/" class="lang-link en">English</a>
        </div>
    </div>
</body>
</html>
